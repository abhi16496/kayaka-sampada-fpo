version: '3.9'

services:
  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kayaka-sampada-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-please}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # AWS SES — email notifications on admin approval
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SES_SENDER: ${AWS_SES_SENDER:-no-reply@kayakasampadafpo.org}
    volumes:
      # Named persistent volume for SQLite database — survives container restarts and redeploys
      - sqlite_data:/app/backend/data
    ports:
      - "5000:5000"
    networks:
      - kayaka-sampada-net

  # ─── Frontend (Next.js PWA) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kayaka-sampada-web
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
    ports:
      - "3000:3000"
    networks:
      - kayaka-sampada-net

volumes:
  # Persistent named volume for the SQLite database file
  sqlite_data:
    driver: local

networks:
  kayaka-sampada-net:
    driver: bridge

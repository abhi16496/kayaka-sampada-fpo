version: '3.9'

services:
  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kayaka-sampada-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-please}
      JWT_EXPIRES_IN: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # AWS SES — email notifications on admin approval
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_SES_SENDER: ${AWS_SES_SENDER:-no-reply@kayakasampadafpo.org}
      # Database connection (PostgreSQL in Coolify)
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
    ports:
      - "5000:5000"
    networks:
      - kayaka-sampada-net

  # ─── Frontend (Next.js PWA) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kayaka-sampada-web
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
    ports:
      - "3000:3000"
    networks:
      - kayaka-sampada-net

networks:
  kayaka-sampada-net:
    driver: bridge

